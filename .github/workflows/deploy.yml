name: Deploy to Production

# El front se sirve estático desde nginx: no hay contenedor que reconstruir,
# solo se reemplazan los archivos de /home/infraestructura/crm.
on:
  push:
    branches:
      - production

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (producción)
        run: npx ng build --configuration production

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Backup del build anterior
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e
            rm -rf /home/infraestructura/crm.bak
            [ -d "/home/infraestructura/crm" ] && cp -r /home/infraestructura/crm /home/infraestructura/crm.bak || true
            mkdir -p /home/infraestructura/crm

      # --delete: si un archivo con hash viejo se queda, nginx lo seguiría sirviendo.
      - name: Publicar el build
        env:
          SSHPASS: ${{ secrets.SERVER_PASSWORD }}
        run: |
          sshpass -e rsync -avz --delete             -e "ssh -o StrictHostKeyChecking=no"             dist/ms-plans-crm/browser/ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/home/infraestructura/crm/

      - name: Verificar que el sitio responde
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e
            test -f /home/infraestructura/crm/index.html || { echo "No quedó index.html: revertir con /home/infraestructura/crm.bak"; exit 1; }
            echo "Archivos publicados: $(ls /home/infraestructura/crm | wc -l)"
            echo "CRM (crm.ius-cloud.com) desplegado"
